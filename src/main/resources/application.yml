spring:
  application:
    name: shopflow-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    group: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: "${REDIS_PASSWORD}"
      timeout: 2s

  cache:
    type: redis
    redis:
      key-prefix: "shopflow:"
      use-key-prefix: true
      cache-null-values: false
      time-to-live: 10m

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: "${MAIL_PASSWORD}"
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS}

  threads:
    virtual:
      enabled: true

  web:
    error:
      include-message: never
      include-binding-errors: never

server:
  port: ${SERVER_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

shopflow:
  security:
    jwt:
      issuer: ${JWT_ISSUER}
      secret: ${JWT_SECRET}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL}

    login-code:
      ttl: ${LOGIN_CODE_TTL}
      max-attempts: ${LOGIN_CODE_MAX_ATTEMPTS}
      email:
        enabled: ${LOGIN_CODE_EMAIL_ENABLED}
        from: ${LOGIN_CODE_EMAIL_FROM}

    default-users:
      admin:
        username: ${SHOPFLOW_ADMIN_USERNAME}
        email: ${SHOPFLOW_ADMIN_EMAIL}
        password: ${SHOPFLOW_ADMIN_PASSWORD}
      customer:
        username: ${SHOPFLOW_CUSTOMER_USERNAME}
        email: ${SHOPFLOW_CUSTOMER_EMAIL}
        password: ${SHOPFLOW_CUSTOMER_PASSWORD}