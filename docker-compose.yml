services:
  postgres:
    image: postgres:18-alpine
    container_name: shopflow-postgres
    environment:
      POSTGRES_DB: shopflow
      POSTGRES_USER: shopflow
      POSTGRES_PASSWORD: shopflow
    ports:
      - "54324:5432"
    volumes:
      - shopflow-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopflow -d shopflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shopflow-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "63793:6379"
    volumes:
      - shopflow-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  shopflow-postgres-data:
  shopflow-redis-data: